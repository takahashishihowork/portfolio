<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Collection</title>

  <link rel="stylesheet" href="css/destyle.css">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

    <section class="banner-page">

      <h1>Banner & Flyer Collection</h1>

      <p class="page-text">
        学習のために制作したバナー・フライヤー作品です。
      </p>

      <div class="banner-list">

        <div class="banner-card">
          <img src="images/header.jpg" alt="有機野菜バナー">
          <p class="caption">
            オーガニック野菜の販促バナー／Photoshop
          </p>
        </div>

        <div class="banner-card">
          <img src="images/coffee.jpg" alt="コーヒーバナー">
          <p class="caption">
            コーヒー定期便の広告バナー／Photoshop
          </p>
        </div>

        <div class="banner-card">
          <img src="images/japan.jpg" alt="和菓子専門店">
          <p class="caption">
            和菓子専門店のHPファーストビュー／Photoshop
          </p>
        </div>

        <div class="banner-card">
          <img src="images/open_house_banner.jpg" alt="オープンハウス">
          <p class="caption">
            オープンハウスバナー／illustrator
          </p>
        </div>

         <div class="banner-card">
          <img src="images/poster.jpg" alt="フィットネスジム">
          <p class="caption">
            フィットネスジム新規入会キャンペーンポスター／illustrator
          </p>
        </div>

         <div class="banner-card">
          <img src="images/seminar.jpg" alt="セミナー">
          <p class="caption">
            デザインセミナー用バナー／illustrator
          </p>
        </div>

      </div>

    </section>

  </main>

</body>

</html>
