<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <section class="contact-page">

    <h1>CONTACT</h1>

    <form>

      <label for="name">お名前</label><br>
      <input
      type="text"
      id="name"
      name="name"
      placeholder="全角で入力してください">

     <label for="email">メールアドレス</label><br>
     <input
     type="email"
     id="email"
     name="email"
     placeholder="半角で入力してください"
     >

    <label for="message">お問い合わせ内容</label><br>
    <textarea
    id="message"
    name="message"
    placeholder="お問い合わせ内容を入力してください"
    ></textarea>

      <button type="submit">
        送信
      </button>

    </form>

  </section>

</div>

</body>
</html>
